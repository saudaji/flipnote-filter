<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0F380F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Flipnote">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Flipnote Filter</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    :root {
      --ink:    #0F380F;
      --dark:   #306230;
      --mid:    #8BAC0F;
      --paper:  #9BBC0F;
    }

    html, body {
      width: 100%; height: 100dvh;
      overflow: hidden;
      background: var(--ink);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    /* ── Viewfinder ───────────────────────────────────────────── */
    #display {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      flex-shrink: 0;
    }

    /* ── Barra inferior ───────────────────────────────────────── */
    .bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 96px;
      background: var(--ink);
      border-top: 3px solid var(--dark);
      display: flex; align-items: center; justify-content: space-around;
      padding: 0 20px;
      z-index: 10;
    }

    .btn {
      background: none; border: none;
      cursor: pointer; user-select: none;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px;
      color: var(--paper);
      font-family: monospace; font-size: 10px; letter-spacing: 1px;
      text-transform: uppercase;
      -webkit-user-select: none;
      padding: 8px 16px;
    }
    .btn-icon {
      width: 44px; height: 44px;
      border: 2px solid var(--dark);
      background: var(--ink);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      transition: background 0.08s, transform 0.08s;
    }
    .btn:active .btn-icon {
      background: var(--dark);
      transform: scale(0.9);
    }

    /* Botón central (captura) */
    #btnCapture .btn-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 3px solid var(--paper);
      font-size: 24px;
    }

    /* REC activo */
    #btnRecord.recording .btn-icon {
      background: #bb0000;
      border-color: #ff4444;
      animation: pulse 1s ease-in-out infinite;
    }
    #btnRecord.recording .btn-label { color: #ff6666; }
    @keyframes pulse { 50% { opacity: 0.55; } }

    /* ── Selector de paleta (esquina superior derecha) ────────── */
    .palettes {
      position: fixed; top: 16px; right: 16px;
      display: flex; flex-direction: column; gap: 7px;
      z-index: 10;
    }
    .pal-swatch {
      width: 26px; height: 26px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .pal-swatch:active { transform: scale(0.88); }
    .pal-swatch.active { border: 2px solid #fff; }

    /* ── Flip button (esquina superior izquierda) ─────────────── */
    #btnFlip {
      position: fixed; top: 16px; left: 16px;
      z-index: 10;
      background: none; border: none;
      cursor: pointer;
      color: var(--paper); font-family: monospace;
      font-size: 10px; letter-spacing: 1px;
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      padding: 4px;
    }
    #btnFlip .btn-icon { width: 36px; height: 36px; font-size: 16px; }

    /* ── FPS counter ──────────────────────────────────────────── */
    #fps {
      position: fixed; bottom: 100px; left: 12px;
      color: var(--dark); font-size: 10px; font-family: monospace;
      z-index: 10; pointer-events: none;
    }

    /* ── Flash ─────────────────────────────────────────────────── */
    #flash {
      position: fixed; inset: 0;
      background: var(--paper);
      opacity: 0; pointer-events: none;
      z-index: 99;
      transition: opacity 0.04s;
    }
    #flash.on { opacity: 0.7; }

    /* ── Pantalla de bienvenida / permiso ─────────────────────── */
    #splash {
      position: fixed; inset: 0;
      background: var(--ink);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px; z-index: 100; padding: 40px;
    }
    #splash.hidden { display: none; }

    .logo {
      font-family: monospace; font-size: 22px;
      color: var(--paper); letter-spacing: 4px;
      text-align: center; line-height: 1.5;
    }
    .logo span {
      display: block; font-size: 11px;
      color: var(--mid); letter-spacing: 3px;
      margin-top: 6px;
    }

    .start-btn {
      background: var(--paper); color: var(--ink);
      border: none; padding: 16px 40px;
      font-family: monospace; font-size: 14px;
      font-weight: bold; letter-spacing: 3px;
      text-transform: uppercase; cursor: pointer;
      transition: background 0.1s;
    }
    .start-btn:active { background: var(--mid); }

    .credits {
      font-family: monospace; font-size: 10px;
      color: var(--dark); text-align: center; line-height: 1.8;
    }
  </style>
</head>
<body>

<!-- Elementos ocultos de procesado -->
<video id="vid" autoplay playsinline muted style="display:none"></video>
<canvas id="small"   style="display:none"></canvas>
<canvas id="scanCvs" style="display:none"></canvas>

<!-- Viewfinder -->
<canvas id="display"></canvas>

<!-- Splash / permiso -->
<div id="splash">
  <div class="logo">
    FLIPNOTE<br>FILTER
    <span>CAMERA EFFECT</span>
  </div>
  <button class="start-btn" id="btnStart">▶ INICIAR</button>
  <p class="credits">
    Flipnote Studio DSi aesthetic<br>
    Bayer dithering · Game Boy palette · Scanlines
  </p>
</div>

<!-- Flash -->
<div id="flash"></div>

<!-- Botón flip (esquina) -->
<button id="btnFlip" aria-label="Voltear cámara">
  <div class="btn-icon">⟳</div>
</button>

<!-- Paletas -->
<div class="palettes" id="palettes"></div>

<!-- Barra de controles -->
<div class="bar">
  <button class="btn" id="btnRecord" aria-label="Grabar video">
    <div class="btn-icon">⏺</div>
    <span class="btn-label">REC</span>
  </button>

  <button class="btn" id="btnCapture" aria-label="Capturar foto">
    <div class="btn-icon">●</div>
  </button>

  <button class="btn" id="btnShare" aria-label="Compartir">
    <div class="btn-icon">↑</div>
    <span class="btn-label">SHARE</span>
  </button>
</div>

<div id="fps"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// PALETAS
// ═══════════════════════════════════════════════════════════════════════
const PALETTES = [
  { name: 'Game Boy',   paper: [155,188, 15], ink: [ 15, 56, 15] },
  { name: 'B&W',        paper: [255,255,255], ink: [  0,  0,  0] },
  { name: 'Amber CRT',  paper: [255,176,  0], ink: [ 60, 20,  0] },
  { name: 'Terminal',   paper: [ 18, 18, 18], ink: [ 57,255, 20] },
  { name: 'Papel',      paper: [212,200,170], ink: [ 30, 20, 10] },
  { name: 'Lo-fi',      paper: [242,196,206], ink: [ 45, 10, 20] },
];
let activePal = 0;

// ═══════════════════════════════════════════════════════════════════════
// BAYER 8×8
// ═══════════════════════════════════════════════════════════════════════
const BAYER8 = new Uint8Array([
   0, 32,  8, 40,  2, 34, 10, 42,
  48, 16, 56, 24, 50, 18, 58, 26,
  12, 44,  4, 36, 14, 46,  6, 38,
  60, 28, 52, 20, 62, 30, 54, 22,
   3, 35, 11, 43,  1, 33,  9, 41,
  51, 19, 59, 27, 49, 17, 57, 25,
  15, 47,  7, 39, 13, 45,  5, 37,
  63, 31, 55, 23, 61, 29, 53, 21,
].map(v => Math.round(v * 255 / 63)));

// ═══════════════════════════════════════════════════════════════════════
// DIMENSIONES
// ═══════════════════════════════════════════════════════════════════════
const DSI_W = 256, DSI_H = 192;
const SCALE  = 4;
const OUT_W  = DSI_W * SCALE;   // 1024
const OUT_H  = DSI_H * SCALE;   // 768

// ═══════════════════════════════════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════════════════════════════════
const vid     = document.getElementById('vid');
const small   = document.getElementById('small');
const scanCvs = document.getElementById('scanCvs');
const display = document.getElementById('display');
const splash  = document.getElementById('splash');
const flash   = document.getElementById('flash');
const fpsEl   = document.getElementById('fps');

small.width   = DSI_W;  small.height   = DSI_H;
scanCvs.width = OUT_W;  scanCvs.height = OUT_H;
display.width = OUT_W;  display.height = OUT_H;

const ctxS  = small.getContext('2d',   { willReadFrequently: true });
const ctxD  = display.getContext('2d', { willReadFrequently: false });
const ctxSc = scanCvs.getContext('2d');
ctxD.imageSmoothingEnabled = false;

// ═══════════════════════════════════════════════════════════════════════
// LAYOUT: ajustar canvas al viewport dejando espacio a la barra
// ═══════════════════════════════════════════════════════════════════════
function relayout() {
  const aspect = OUT_W / OUT_H;
  const avW = window.innerWidth;
  const avH = window.innerHeight - 96;
  let w, h;
  if (avW / avH > aspect) { h = avH; w = h * aspect; }
  else                     { w = avW; h = w / aspect; }
  display.style.width  = w + 'px';
  display.style.height = h + 'px';
}
window.addEventListener('resize', relayout);
relayout();

// ═══════════════════════════════════════════════════════════════════════
// SCANLINES (pre-renderizado una vez)
// ═══════════════════════════════════════════════════════════════════════
function buildScanlines() {
  ctxSc.clearRect(0, 0, OUT_W, OUT_H);
  ctxSc.fillStyle = 'rgba(0,0,0,0.65)';   // borde de pixel DSi
  for (let y = 0; y < OUT_H; y += SCALE) ctxSc.fillRect(0, y, OUT_W, 1);
  ctxSc.fillStyle = 'rgba(0,0,0,0.20)';   // CRT suave
  for (let y = 1; y < OUT_H; y += 2)     ctxSc.fillRect(0, y, OUT_W, 1);
}
buildScanlines();

// ═══════════════════════════════════════════════════════════════════════
// PALETAS UI
// ═══════════════════════════════════════════════════════════════════════
const palContainer = document.getElementById('palettes');
PALETTES.forEach((p, i) => {
  const s = document.createElement('div');
  s.className = 'pal-swatch' + (i === 0 ? ' active' : '');
  s.style.background   = `rgb(${p.paper})`;
  s.style.borderColor  = `rgb(${p.ink})`;
  s.title = p.name;
  s.addEventListener('click', () => {
    activePal = i;
    document.querySelectorAll('.pal-swatch').forEach((b,j) =>
      b.classList.toggle('active', j === i));
  });
  palContainer.appendChild(s);
});

// ═══════════════════════════════════════════════════════════════════════
// CÁMARA
// ═══════════════════════════════════════════════════════════════════════
let facingMode = 'environment';
let stream = null;

async function startCamera(facing) {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: facing, width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false,
  });
  vid.srcObject = stream;
  await vid.play();
}

document.getElementById('btnStart').addEventListener('click', async () => {
  await startCamera(facingMode);
  splash.classList.add('hidden');
  requestAnimationFrame(loop);
});

document.getElementById('btnFlip').addEventListener('click', () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera(facingMode);
});

// ═══════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════
const lowBuf = new Uint8ClampedArray(DSI_W * DSI_H * 4);

function processFrame() {
  if (!vid.videoWidth) return;
  const p = PALETTES[activePal];
  const [PR, PG, PB] = p.paper;
  const [IR, IG, IB] = p.ink;

  // Crop-to-fill: recortar el video para llenar 256×192 sin deformar
  const vA = vid.videoWidth / vid.videoHeight, cA = DSI_W / DSI_H;
  let sx = 0, sy = 0, sw = vid.videoWidth, sh = vid.videoHeight;
  if (vA > cA) { sw = sh * cA; sx = (vid.videoWidth  - sw) / 2; }
  else          { sh = sw / cA; sy = (vid.videoHeight - sh) / 2; }

  ctxS.save();
  if (facingMode === 'user') { ctxS.translate(DSI_W, 0); ctxS.scale(-1, 1); }
  ctxS.drawImage(vid, sx, sy, sw, sh, 0, 0, DSI_W, DSI_H);
  ctxS.restore();

  const { data: src } = ctxS.getImageData(0, 0, DSI_W, DSI_H);

  for (let y = 0; y < DSI_H; y++) {
    const row8 = (y & 7) << 3;
    for (let x = 0; x < DSI_W; x++) {
      const i    = (y * DSI_W + x) << 2;
      const gray = (src[i] * 77 + src[i+1] * 150 + src[i+2] * 29) >> 8;
      const isInk = gray < BAYER8[row8 + (x & 7)];
      lowBuf[i]   = isInk ? IR : PR;
      lowBuf[i+1] = isInk ? IG : PG;
      lowBuf[i+2] = isInk ? IB : PB;
      lowBuf[i+3] = 255;
    }
  }

  ctxS.putImageData(new ImageData(lowBuf, DSI_W, DSI_H), 0, 0);
  ctxD.drawImage(small, 0, 0, OUT_W, OUT_H);   // nearest-neighbor upscale
  ctxD.drawImage(scanCvs, 0, 0);               // scanlines overlay
}

let lastT = performance.now(), frameCount = 0;
function loop(t) {
  processFrame();
  frameCount++;
  if (t - lastT >= 1000) {
    fpsEl.textContent = frameCount + ' fps';
    frameCount = 0; lastT = t;
  }
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════════════
// CAPTURA (foto)
// ═══════════════════════════════════════════════════════════════════════
document.getElementById('btnCapture').addEventListener('click', async () => {
  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 120);

  display.toBlob(async blob => {
    const file = new File([blob], 'flipnote_' + Date.now() + '.png', { type: 'image/png' });
    if (navigator.canShare?.({ files: [file] })) {
      await navigator.share({ files: [file], title: 'Flipnote Filter' }).catch(() => {});
    } else {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = file.name; a.click();
    }
  }, 'image/png');
});

// ═══════════════════════════════════════════════════════════════════════
// GRABACIÓN (video)
// ═══════════════════════════════════════════════════════════════════════
let recorder = null, chunks = [], lastBlob = null;
const btnRec = document.getElementById('btnRecord');

btnRec.addEventListener('click', () => {
  if (!recorder || recorder.state === 'inactive') {
    const mimes = ['video/mp4', 'video/webm;codecs=vp9', 'video/webm'];
    const mime  = mimes.find(m => MediaRecorder.isTypeSupported(m)) ?? '';
    chunks = []; lastBlob = null;
    recorder = new MediaRecorder(display.captureStream(30), {
      ...(mime ? { mimeType: mime } : {}),
      videoBitsPerSecond: 6_000_000,
    });
    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    recorder.onstop = () => {
      const ext  = (recorder.mimeType ?? '').includes('mp4') ? 'mp4' : 'webm';
      lastBlob   = new Blob(chunks, { type: recorder.mimeType });
      lastBlob._ext = ext;
      document.getElementById('btnShare').style.color = 'var(--paper)';
    };
    recorder.start(200);
    btnRec.classList.add('recording');
    btnRec.querySelector('.btn-label').textContent = 'STOP';
    btnRec.querySelector('.btn-icon').textContent  = '⏹';
  } else {
    recorder.stop();
    btnRec.classList.remove('recording');
    btnRec.querySelector('.btn-label').textContent = 'REC';
    btnRec.querySelector('.btn-icon').textContent  = '⏺';
  }
});

// ═══════════════════════════════════════════════════════════════════════
// SHARE (último video grabado)
// ═══════════════════════════════════════════════════════════════════════
document.getElementById('btnShare').addEventListener('click', async () => {
  if (!lastBlob) { alert('Graba un video primero con ⏺ REC'); return; }
  const ext  = lastBlob._ext ?? 'webm';
  const file = new File([lastBlob], 'flipnote_' + Date.now() + '.' + ext,
                        { type: lastBlob.type });
  if (navigator.canShare?.({ files: [file] })) {
    await navigator.share({ files: [file], title: 'Flipnote Filter' }).catch(() => {});
  } else {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(lastBlob); a.download = file.name; a.click();
  }
});

// ═══════════════════════════════════════════════════════════════════════
// SERVICE WORKER
// ═══════════════════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
